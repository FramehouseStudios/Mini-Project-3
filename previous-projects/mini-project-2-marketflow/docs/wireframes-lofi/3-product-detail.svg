    <rect x="14" y="100" width="512" height="150" rx="5" fill="#fff" stroke="#cccccc"/>
    <rect x="26" y="112" width="180" height="126" rx="4" fill="#efefef" stroke="#b5b5b5" stroke-dasharray="5 3"/>
    <line x1="26" y1="112" x2="206" y2="238" stroke="#d2d2d2"/><line x1="206" y1="112" x2="26" y2="238" stroke="#d2d2d2"/>
    <text x="116" y="178" font-size="9" fill="#999" text-anchor="middle">PRODUCT IMG</text>
    <rect x="222" y="116" width="74" height="16" rx="8" fill="#e6e6e6"/><text x="259" y="127" font-size="8" fill="#666" text-anchor="middle">category</text>
