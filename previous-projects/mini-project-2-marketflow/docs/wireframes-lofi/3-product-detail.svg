    <text x="250" y="45" font-size="10" fill="#cfcfcf">Dashboard · Products · Planner · About</text>
    <circle cx="518" cy="41" r="9" fill="#5a5a5a"/><text x="518" y="45" font-size="9" fill="#fff" text-anchor="middle">2</text>

