    <circle cx="16" cy="13" r="4" fill="#c0c0c0"/><circle cx="30" cy="13" r="4" fill="#c0c0c0"/><circle cx="44" cy="13" r="4" fill="#c0c0c0"/>
    <rect x="66" y="6" width="330" height="14" rx="7" fill="#fff" stroke="#c8c8c8"/>
    <text x="76" y="16" font-size="9" fill="#888">marketflow.app/products/7   ← dynamic route param</text>
    <rect x="1.5" y="25.5" width="537" height="30" fill="#3a3a3a"/>
