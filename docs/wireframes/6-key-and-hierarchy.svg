<svg viewBox="0 0 580 540" width="580" height="540" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="580" height="540" fill="#f9ddc8"/>
  <text x="20" y="34" font-size="16" font-weight="800" fill="#222">Key &amp; Component Hierarchy</text>
  <g transform="translate(20,50)">
    <rect x="0" y="0" width="540" height="470" fill="#f9ddc8" stroke="#7a3b30" stroke-width="1.5"/>

    <text x="20" y="34" font-size="13" font-weight="800" fill="#261715">Wireframe key</text>
    <rect x="20" y="46" width="40" height="22" rx="3" fill="#fff3eb" stroke="#e6c3ad" stroke-dasharray="5 3"/><text x="70" y="61" font-size="10" fill="#7a6259">Image / media placeholder</text>
    <rect x="20" y="76" width="40" height="22" rx="4" fill="#e24b3d"/><text x="70" y="91" font-size="10" fill="#7a6259">Primary button / CTA</text>
    <rect x="20" y="106" width="40" height="22" rx="4" fill="#fffaf6" stroke="#e24b3d"/><text x="70" y="121" font-size="10" fill="#7a6259">Secondary / outline button</text>
    <rect x="20" y="136" width="40" height="16" rx="8" fill="#eaddd1"/><text x="70" y="148" font-size="10" fill="#7a6259">Chip / tag / category</text>
    <rect x="20" y="162" width="40" height="8" rx="3" fill="#f1d8c6"/><text x="70" y="170" font-size="10" fill="#7a6259">Text content / label</text>

    <line x1="20" y1="190" x2="520" y2="190" stroke="#efc8b4"/>

    <text x="20" y="214" font-size="13" font-weight="800" fill="#261715">Component hierarchy</text>
    <g font-family="Courier New, monospace" font-size="11" fill="#4a3a34">
      <text x="20" y="236">App  (Routes)</text>
      <text x="20" y="254">└─ AppProvider          ← Context: savedProductIds</text>
      <text x="20" y="272">   └─ Layout             ← AppBar + nav + Outlet</text>
      <text x="20" y="290">      ├─ DashboardPage    ← StatCard, ProductGrid</text>
      <text x="20" y="308">      ├─ ProductsPage     ← ProductControls,</text>
      <text x="20" y="324">      │                     ProductGrid → ProductCard</text>
      <text x="20" y="342">      ├─ ProductDetailPage ← ProductReviewForm</text>
      <text x="20" y="360">      ├─ PlannerPage      ← saved-item rows</text>
      <text x="20" y="378">      └─ AboutPage</text>
    </g>
    <line x1="20" y1="394" x2="520" y2="394" stroke="#efc8b4"/>
    <text x="20" y="416" font-size="11" fill="#4a3a34"><tspan font-weight="700">Hooks:</tspan>  useState · useEffect · useContext · useMemo · useParams · useSearchParams</text>
    <text x="20" y="436" font-size="11" fill="#4a3a34"><tspan font-weight="700">Custom hook:</tspan>  useProducts()  → Axios fetch of fakestoreapi.com/products</text>
    <text x="20" y="456" font-size="11" fill="#4a3a34"><tspan font-weight="700">Tools:</tspan>  React 19 · Vite · React Router · Material UI · Axios</text>
  </g>
</svg>
